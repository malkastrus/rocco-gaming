<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rocco Gaming 🎮</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Exo 2',sans-serif;background:#060610;color:#e2e8f0;min-height:100vh}
input,select{background:#0d0d20;border:1px solid #1e1e40;color:#e2e8f0;font-family:'Exo 2',sans-serif;outline:none;padding:9px 12px;border-radius:8px;font-size:13px;width:100%;transition:border-color .2s}
input:focus,select:focus{border-color:#00e5ff}
button{font-family:'Exo 2',sans-serif;cursor:pointer}
.bp{background:linear-gradient(135deg,#00e5ff,#0099cc);color:#000;font-weight:700;border:none;padding:10px 20px;border-radius:8px}
.bs{background:transparent;border:1px solid #00e5ff44;color:#00e5ff;padding:10px 20px;border-radius:8px}
.panel{background:#0d0d20;border:1px solid #1e1e40;border-radius:12px}
.tag{display:inline-block;padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.ok{background:#22c55e18;color:#22c55e;border:1px solid #22c55e44}
.no{background:#ef444418;color:#ef4444;border:1px solid #ef444444}
.wr{background:#f59e0b18;color:#f59e0b;border:1px solid #f59e0b44}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.sc{background:#0d0d20;border-radius:11px;padding:18px}
.sidebar{width:200px;background:#0d0d20;border-right:1px solid #1e1e40;position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:50}
.nb{width:100%;display:flex;align-items:center;gap:8px;padding:9px;border-radius:7px;border:none;background:transparent;color:#475569;font-size:12px;text-align:left;font-family:'Exo 2',sans-serif;margin-bottom:1px;border-left:2px solid transparent;transition:all .2s}
.nb.on,.nb:hover{background:#00e5ff11;color:#00e5ff;border-left-color:#00e5ff}
.mc{margin-left:200px;padding:24px;min-height:100vh}
.tab{display:none}.tab.on{display:block}
.lbl{font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px}
table{width:100%;border-collapse:collapse}
th{padding:11px 14px;text-align:left;font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1px;font-weight:600;border-bottom:1px solid #1e1e40}
td{padding:11px 14px;border-bottom:1px solid #0f0f25}
.mb{position:fixed;inset:0;background:#000a;display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.md{background:#0d0d20;border:1px solid #1e1e40;border-radius:14px;padding:26px;width:100%;max-width:480px;max-height:90vh;overflow:auto}
.notif{position:fixed;top:20px;right:20px;z-index:9999;background:#0d0d20;padding:12px 20px;border-radius:8px;font-weight:600;font-size:14px;max-width:320px;transform:translateX(500px);transition:transform .3s}
.notif.on{transform:translateX(0)}
.pcard{background:#0d0d20;border:1px solid #1e1e40;border-radius:12px;overflow:hidden;transition:transform .2s}
.pcard:hover{transform:translateY(-4px)}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
h1,h2,h3{font-family:'Orbitron',sans-serif}
</style>
</head>
<body>
<div id="notif" class="notif"></div>
<div id="vl" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#0d1a2e,#060610)">
  <div style="width:380px;padding:0 20px">
    <div style="text-align:center;margin-bottom:40px">
      <div style="font-size:56px;margin-bottom:8px">🎮</div>
      <h1 style="font-size:26px;background:linear-gradient(135deg,#00e5ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px">ROCCO GAMING</h1>
      <p style="color:#475569;font-size:11px;margin-top:6px;letter-spacing:4px">PANEL DE CONTROL</p>
    </div>
    <div class="panel" style="padding:32px">
      <label class="lbl">Usuario</label><input id="lu" placeholder="rocco" style="margin-bottom:14px"/>
      <label class="lbl">Contraseña</label><input id="lp" type="password" placeholder="••••••••"/>
      <p id="le" style="color:#ef4444;font-size:13px;margin:10px 0 0;text-align:center;display:none">Credenciales incorrectas</p>
      <button class="bp" onclick="doLogin()" style="width:100%;margin-top:20px;padding:12px;font-size:15px">INGRESAR</button>
      <div style="border-top:1px solid #1e1e40;margin-top:20px;padding-top:16px;text-align:center">
        <button onclick="sv('s')" style="background:none;border:none;color:#00e5ff;font-size:13px">🌐 Ver Tienda →</button>
      </div>
    </div>
    <p style="text-align:center;color:#334155;font-size:11px;margin-top:12px">usuario: rocco · contraseña: gaming2025</p>
  </div>
</div>

<div id="vs" style="display:none;min-height:100vh">
  <header style="background:#0d0d20;border-bottom:1px solid #1e1e40;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100">
    <div style="display:flex;align-items:center;gap:12px"><span style="font-size:28px">🎮</span><div><h1 style="font-size:16px;background:linear-gradient(135deg,#00e5ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">ROCCO GAMING</h1><p style="font-size:10px;color:#475569;letter-spacing:2px">GEEK & GAMER STORE 🇻🇪</p></div></div>
    <div style="display:flex;gap:12px;align-items:center"><a href="https://wa.me/584246689203" target="_blank" style="color:#22c55e;text-decoration:none;font-size:13px">💬 WhatsApp</a><button onclick="sv('a')" style="background:none;border:1px solid #1e1e40;color:#475569;padding:5px 12px;border-radius:6px;font-size:11px">⚙️ Admin</button></div>
  </header>
  <div id="spb" style="background:linear-gradient(135deg,#0d1a2e,#0d0d20);border-bottom:1px solid #1e1e40;padding:8px 24px;display:flex;gap:20px;flex-wrap:wrap;justify-content:center;font-size:12px"></div>
  <div style="max-width:1100px;margin:0 auto;padding:28px 20px">
    <div style="display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap">
      <input id="ssrch" oninput="rS()" placeholder="🔍 Buscar producto..." style="flex:1;min-width:180px"/>
      <div id="scats" style="display:flex;gap:8px;flex-wrap:wrap"></div>
    </div>
    <div id="sgrid" class="pgrid"></div>
  </div>
</div>

<div id="mbuy" class="mb" style="display:none"><div class="md">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><h3 id="mbt" style="font-size:14px;color:#00e5ff"></h3><button onclick="cm('mbuy')" style="background:none;border:none;color:#475569;font-size:18px">✕</button></div>
  <div class="g2" style="margin-bottom:12px"><div><label class="lbl">Nombre *</label><input id="bn"/></div><div><label class="lbl">Teléfono *</label><input id="bph" placeholder="+584XXXXXXXXX"/></div></div>
  <div style="margin-bottom:12px"><label class="lbl">Dirección</label><input id="bad"/></div>
  <div style="margin-bottom:12px"><label class="lbl">Método de Pago</label><select id="bpm" onchange="ubc()"><option value="Binance">🔶 Binance P2P</option><option value="Pago Móvil">📱 Pago Móvil</option><option value="Efectivo">💵 Efectivo</option></select></div>
  <div id="btr" style="display:none;margin-bottom:12px"><label class="lbl">Tasa recibida (Bs/$)</label><input id="bts" type="number" oninput="ubc()"/><p id="btc" style="font-size:11px;color:#f59e0b;margin-top:4px"></p></div>
  <div id="bpr" style="background:#060610;border-radius:8px;padding:12px;margin-bottom:14px"></div>
  <button class="bp" onclick="sBuy()" style="width:100%;padding:11px;font-size:14px">💬 ENVIAR POR WHATSAPP</button>
</div></div>

<div id="mint" class="mb" style="display:none"><div class="md">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><h3 id="mit" style="font-size:14px;color:#f59e0b"></h3><button onclick="cm('mint')" style="background:none;border:none;color:#475569;font-size:18px">✕</button></div>
  <p style="color:#475569;font-size:13px;margin-bottom:16px">Te avisaremos cuando esté disponible.</p>
  <div style="display:flex;flex-direction:column;gap:12px">
    <div><label class="lbl">Nombre *</label><input id="in"/></div>
    <div><label class="lbl">WhatsApp *</label><input id="ip" placeholder="+584XXXXXXXXX"/></div>
    <button class="bs" onclick="sInt()" style="padding:11px;font-size:14px">✅ REGISTRAR INTERÉS</button>
  </div>
</div></div>

<div id="va" style="display:none;flex">
  <div class="sidebar">
    <div style="padding:16px 14px;border-bottom:1px solid #1e1e40"><div style="font-size:24px;margin-bottom:3px">🎮</div><h2 style="font-size:11px;background:linear-gradient(135deg,#00e5ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">ROCCO GAMING</h2><p style="font-size:9px;color:#475569;letter-spacing:2px;margin-top:2px">ADMIN PANEL</p></div>
    <nav style="flex:1;padding:8px 7px;overflow-y:auto" id="nav"></nav>
    <div style="padding:8px 7px;border-top:1px solid #1e1e40;display:flex;flex-direction:column;gap:4px">
      <button onclick="sv('s')" style="width:100%;padding:7px;border-radius:7px;border:1px solid #1e1e40;background:transparent;color:#475569;font-size:11px">🌐 Tienda</button>
      <button onclick="sv('l')" style="width:100%;padding:7px;border-radius:7px;border:none;background:transparent;color:#ef4444;font-size:11px">🚪 Salir</button>
    </div>
  </div>
  <div class="mc">
    <div id="tab-d" class="tab on"></div>
    <div id="tab-p" class="tab"></div>
    <div id="tab-o" class="tab"></div>
    <div id="tab-e" class="tab"></div>
    <div id="tab-c" class="tab"></div>
    <div id="tab-f" class="tab"></div>
    <div id="tab-k" class="tab"></div>
    <div id="tab-s" class="tab"></div>
  </div>
</div>

<script>
const WA="584246689203";
const g=id=>document.getElementById(id);
let D={
  products:[
    {id:1,name:"Control PS5 DualSense",desc:"Control inalámbrico original Sony PS5",priceUSD:45,cost:28,stock:3,status:'available',cat:'Consolas',em:'🎮',waitlist:[]},
    {id:2,name:"Audífonos Gaming RGB",desc:"Surround 7.1, micrófono RGB",priceUSD:25,cost:12,stock:0,status:'agotado',cat:'Accesorios',em:'🎧',waitlist:[]},
    {id:3,name:"Mousepad XL Gamer",desc:"900×400mm superficie textil premium",priceUSD:12,cost:5,stock:5,status:'available',cat:'PC Gaming',em:'🖱️',waitlist:[]},
    {id:4,name:"Figura Goku Ultra Instinct",desc:"Figura coleccionable 20cm PVC",priceUSD:18,cost:8,stock:2,status:'available',cat:'Coleccionables',em:'⚡',waitlist:[]},
    {id:5,name:"Teclado Mecánico TKL",desc:"Switch Blue, RGB, sin numpad",priceUSD:38,cost:20,stock:1,status:'available',cat:'PC Gaming',em:'⌨️',waitlist:[]},
  ],
  orders:[
    {id:1,client:"Carlos M.",phone:"+58412345678",products:["Control PS5 DualSense"],total:45,payment:"Binance",status:'completado',date:'2025-03-01',tasa:38.5},
    {id:2,client:"María G.",phone:"+58424987654",products:["Mousepad XL Gamer"],total:12,payment:"Pago Móvil",status:'pendiente',date:'2025-03-08',tasa:38.5},
    {id:3,client:"Luis P.",phone:"+58416555444",products:["Figura Goku"],total:18,payment:"Efectivo",status:'completado',date:'2025-03-10',tasa:38.5},
  ],
  expenses:[
    {id:1,desc:"Compra AliExpress x5",amount:60,currency:'USD',type:'compra',date:'2025-03-01'},
    {id:2,desc:"Envío DHL",amount:15,currency:'USD',type:'envio',date:'2025-03-03'},
    {id:3,desc:"Publicidad IG",amount:10,currency:'USD',type:'marketing',date:'2025-03-05'},
  ],
  clients:[
    {id:1,name:"Carlos M.",phone:"+58412345678",purchases:2,total:63,lastBuy:'2025-03-01'},
    {id:2,name:"María G.",phone:"+58424987654",purchases:1,total:12,lastBuy:'2025-03-08'},
    {id:3,name:"Luis P.",phone:"+58416555444",purchases:1,total:18,lastBuy:'2025-03-10'},
  ],
  cfg:{tasaBCV:38.5,tasaParalelo:40.2,tasaCLP:950,binanceUser:'RoccoGaming',pagoMovil:'04246687613',cedula:'26618867',banco:'Banesco',zones:[{name:'Local',price:2},{name:'Caracas',price:5},{name:'Interior',price:8}]},
  cp:null,cat:'Todos',ctab:'d'
};

function ntf(msg,type='ok'){
  const c={ok:'#22c55e',err:'#ef4444',info:'#00e5ff'};
  const el=g('notif');
  el.textContent=msg; el.style.borderLeft='3px solid '+c[type]; el.style.color=c[type];
  el.classList.add('on'); setTimeout(()=>el.classList.remove('on'),3000);
}

function sv(v){
  ['vl','vs','va'].forEach(id=>{const el=g(id);el.style.display='none';});
  if(v==='l'){g('vl').style.display='flex';}
  else if(v==='s'){g('vs').style.display='block';rS();}
  else if(v==='a'){g('va').style.display='flex';buildNav();rT(D.ctab);}
}

function buildNav(){
  const tabs=[['d','📊','Dashboard'],['p','📦','Productos'],['o','🛒','Pedidos'],['e','💸','Gastos'],['c','👥','Clientes'],['f','📈','Finanzas'],['k','🧮','Calculadoras'],['s','⚙️','Ajustes']];
  g('nav').innerHTML=tabs.map(([id,ic,lb])=>`<button class="nb${D.ctab===id?' on':''}" onclick="sT('${id}',this)">${ic} ${lb}</button>`).join('');
}

function sT(t,btn){
  document.querySelectorAll('.tab').forEach(el=>{el.classList.remove('on');el.style.display='none';});
  document.querySelectorAll('.nb').forEach(el=>el.classList.remove('on'));
  g('tab-'+t).classList.add('on'); g('tab-'+t).style.display='block';
  btn.classList.add('on'); D.ctab=t; rT(t);
}

function rT(t){
  const fns={d:rDash,p:rProd,o:rOrders,e:rExp,c:rCRM,f:rFin,k:rCalc,s:rCfg};
  if(fns[t]) fns[t]();
}

function doLogin(){
  if(g('lu').value==='rocco'&&g('lp').value==='gaming2025') sv('a');
  else{g('le').style.display='block';setTimeout(()=>g('le').style.display='none',2500);}
}
g('lp').onkeydown=e=>e.key==='Enter'&&doLogin();

function cm(id){g(id).style.display='none';}

// STORE
function rS(){
  const cfg=D.cfg;
  g('spb').innerHTML=`<span style="color:#475569">💵 <span style="color:#e2e8f0">Efectivo</span></span><span style="color:#475569">🔶 Binance: <strong style="color:#00e5ff">${cfg.binanceUser}</strong></span><span style="color:#475569">📱 PM: <strong style="color:#00e5ff">${cfg.pagoMovil}·V-${cfg.cedula}</strong></span><span style="color:#475569">💱 BCV: <strong style="color:#f59e0b">Bs.${cfg.tasaBCV}</strong></span>`;
  const cats=['Todos',...new Set(D.products.map(p=>p.cat))];
  g('scats').innerHTML=cats.map(c=>`<button onclick="setCat('${c}')" style="padding:8px 16px;border-radius:20px;border:1px solid ${D.cat===c?'#00e5ff':'#1e1e40'};background:${D.cat===c?'#00e5ff11':'transparent'};color:${D.cat===c?'#00e5ff':'#475569'};cursor:pointer;font-size:12px">${c}</button>`).join('');
  const q=(g('ssrch').value||'').toLowerCase();
  const list=D.products.filter(p=>(D.cat==='Todos'||p.cat===D.cat)&&p.name.toLowerCase().includes(q));
  g('sgrid').innerHTML=list.map(p=>{
    const av=p.status==='available'&&p.stock>0;
    return `<div class="pcard" style="border:1px solid ${av?'#00e5ff18':'#1e1e40'}">
      <div style="height:140px;background:linear-gradient(135deg,#0a0a1e,#0d1a2e);display:flex;align-items:center;justify-content:center;font-size:64px;position:relative">${p.em}${!av?'<div style="position:absolute;inset:0;background:#00000077;display:flex;align-items:center;justify-content:center"><span class="tag no">AGOTADO</span></div>':''}</div>
      <div style="padding:16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:7px"><span style="font-size:10px;color:#475569;text-transform:uppercase">${p.cat}</span><span class="tag ${av?'ok':'no'}">${av?'Stock:'+p.stock:'Agotado'}</span></div>
        <h3 style="font-size:12px;font-weight:700;margin-bottom:5px;line-height:1.3">${p.name}</h3>
        <p style="font-size:11px;color:#475569;margin-bottom:12px;line-height:1.5">${p.desc}</p>
        <div style="background:#060610;border-radius:8px;padding:9px;margin-bottom:12px">
          <div style="font-size:19px;font-weight:700;color:#00e5ff;font-family:'Orbitron',sans-serif">$${p.priceUSD} <span style="font-size:10px;color:#475569">USD</span></div>
          <div style="font-size:11px;color:#f59e0b;margin-top:2px">Bs. ${(p.priceUSD*cfg.tasaBCV).toFixed(2)}</div>
          <div style="font-size:10px;color:#a855f7">$ ${(p.priceUSD*cfg.tasaCLP).toLocaleString()} CLP</div>
        </div>
        ${av?`<button class="bp" onclick="oBuy(${p.id})" style="width:100%;padding:8px;font-size:13px">🛒 COMPRAR</button>`:`<button class="bs" onclick="oInt(${p.id})" style="width:100%;padding:8px;font-size:13px">🔔 ME INTERESA</button>`}
      </div></div>`;
  }).join('');
}
function setCat(c){D.cat=c;rS();}

function oBuy(id){
  D.cp=D.products.find(p=>p.id===id);
  g('mbt').textContent='Comprar: '+D.cp.name;
  g('bn').value='';g('bph').value='';g('bad').value='';
  g('bpm').value='Binance';g('bts').value=D.cfg.tasaBCV;g('btr').style.display='none';
  ubc();g('mbuy').style.display='flex';
}
function ubc(){
  const p=D.cp; if(!p) return;
  const pm=g('bpm').value, st=pm==='Pago Móvil'||pm==='Efectivo';
  g('btr').style.display=st?'block':'none';
  const t=parseFloat(g('bts').value)||D.cfg.tasaBCV;
  if(st) g('btc').textContent='= Bs. '+(p.priceUSD*t).toFixed(2);
  g('bpr').innerHTML=`<div style="display:flex;justify-content:space-between;padding:4px 0"><span style="font-size:12px;color:#475569">USD:</span><strong style="color:#00e5ff">$${p.priceUSD}</strong></div><div style="display:flex;justify-content:space-between;padding:4px 0"><span style="font-size:12px;color:#475569">Bs:</span><strong style="color:#f59e0b">Bs. ${(p.priceUSD*t).toFixed(2)}</strong></div><div style="display:flex;justify-content:space-between;padding:4px 0"><span style="font-size:12px;color:#475569">CLP:</span><strong style="color:#a855f7">$ ${(p.priceUSD*D.cfg.tasaCLP).toLocaleString()}</strong></div>`;
}
function sBuy(){
  const n=g('bn').value,ph=g('bph').value;
  if(!n||!ph){ntf('Completá nombre y teléfono','err');return;}
  const p=D.cp,t=parseFloat(g('bts').value)||D.cfg.tasaBCV,pm=g('bpm').value,ad=g('bad').value;
  const msg=encodeURIComponent(`🎮 *PEDIDO - ROCCO GAMING*\n📦 ${p.name}\n💵 $${p.priceUSD} USD\n💸 Bs. ${(p.priceUSD*t).toFixed(2)}\n💳 ${pm}\n👤 ${n}\n📱 ${ph}${ad?'\n📍 '+ad:''}`);
  window.open('https://wa.me/'+WA+'?text='+msg,'_blank');
  cm('mbuy');ntf('¡Pedido enviado! 🎉');
}
function oInt(id){
  D.cp=D.products.find(p=>p.id===id);
  g('mit').textContent='🔔 Avísame: '+D.cp.name;
  g('in').value='';g('ip').value='';
  g('mint').style.display='flex';
}
function sInt(){
  const n=g('in').value,ph=g('ip').value;
  if(!n||!ph){ntf('Completá tus datos','err');return;}
  D.cp.waitlist.push({name:n,phone:ph});
  cm('mint');ntf('¡Te avisaremos! 🔔');
}

// DASHBOARD
function rDash(){
  const el=g('tab-d');
  const done=D.orders.filter(o=>o.status==='completado');
  const sales=done.reduce((s,o)=>s+o.total,0);
  const exps=D.expenses.reduce((s,e)=>s+e.amount,0);
  const profit=sales-exps;
  const cfg=D.cfg;
  el.innerHTML=`<div style="margin-bottom:22px"><h2 style="font-size:20px;background:linear-gradient(135deg,#00e5ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Dashboard</h2><p style="color:#475569;font-size:12px;margin-top:3px">Resumen de tu actividad</p></div>
  <div class="g3" style="margin-bottom:24px">

function tpf(){const f=g('pf');f.style.display=f.style.display==='none'?'block':'none';}
function sEm(e){document.querySelectorAll('[id^="eb"]').forEach(b=>b.style.border='2px solid #1e1e40');const b=g('eb'+e);if(b)b.style.border='2px solid #00e5ff';eem=e;}
function upc(){const pr=parseFloat(g('pfp').value)||0,co=parseFloat(g('pfco').value)||0,cfg=D.cfg;if(pr){g('pfc2').style.display='flex';g('pfc2').innerHTML=`<span style="color:#475569">USD: <strong style="color:#00e5ff">$${pr}</strong></span><span style="color:#475569">Bs: <strong style="color:#f59e0b">${(pr*cfg.tasaBCV).toFixed(2)}</strong></span>${co?`<span style="color:#22c55e;font-weight:700">Ganancia: $${(pr-co).toFixed(2)}</span>`:''}`;}
}
function sProd(){
  const n=g('pfn').value,pr=g('pfp').value;

  if(eid){const i=D.products.findIndex(p=>p.id===eid);D.products[i]={...D.products[i],...d};ntf('Actualizado ✅');}
  else{D.products.push({...d,id:Date.now()});ntf('Agregado ✅');}
  rProd();
}
function eprod(id){const p=D.products.find(x=>x.id===id);eid=id;g('pf').style.display='block';g('pft').textContent='Editar';g('psb').textContent='💾 Guardar';g('pfn').value=p.name;g('pfd').value=p.desc;g('pfp').value=p.priceUSD;g('pfco').value=p.cost;g('pfst').value=p.stock;g('pfes').value=p.status;g('pfc').value=p.cat;sEm(p.em);}
function dprod(id){D.products=D.products.filter(p=>p.id!==id);ntf('Eliminado','info');rProd();}
function tps(id){const p=D.products.find(x=>x.id===id);p.status=p.status==='available'?'agotado':'available';rProd();ntf('Estado actualizado');}

      ${o.phone?`<button onclick="waOrd(${o.id})" style="background:#25d36611;border:1px solid #25d36644;color:#25d366;padding:5px 12px;border-radius:7px;font-size:12px">💬 WA</button>`:''}
      ${o.status!=='cancelado'?`<button onclick="cnOrd(${o.id})" style="background:#ef444411;border:1px solid #ef444444;color:#ef4444;padding:5px 12px;border-radius:7px;font-size:12px">✕</button>`:''}

function tof(){const f=g('of');f.style.display=f.style.display==='none'?'block':'none';}
function sOrd(){
  const cl=g('ocl').value,pid=g('opr').value;
  if(!cl||!pid){ntf('Cliente y producto requeridos','err');return;}
  const prod=D.products.find(p=>p.id===parseInt(pid));
  const st=g('ost').value;
  const o={id:Date.now(),client:cl,phone:g('oph').value,products:[prod.name],total:prod.priceUSD,payment:g('opm').value,status:st,date:new Date().toISOString().split('T')[0],tasa:parseFloat(g('ots').value)||D.cfg.tasaBCV};
  D.orders.push(o);
  if(st==='completado'){prod.stock=Math.max(0,prod.stock-1);aClient(cl,g('oph').value,prod.priceUSD,o.date);}
  ntf('Pedido registrado ✅');rOrders();
}
function aClient(n,ph,t,d){const ex=D.clients.find(c=>c.phone===ph);if(ex){ex.purchases++;ex.total+=t;ex.lastBuy=d;}else if(ph)D.clients.push({id:Date.now(),name:n,phone:ph,purchases:1,total:t,lastBuy:d});}
function cfOrd(id){const o=D.orders.find(x=>x.id===id);if(o.status==='completado')return;const p=D.products.find(p=>p.name===o.products[0]);if(p)p.stock=Math.max(0,p.stock-1);o.status='completado';aClient(o.client,o.phone,o.total,o.date);ntf('✅ Confirmado');rOrders();}
function cnOrd(id){D.orders.find(x=>x.id===id).status='cancelado';ntf('Cancelado','info');rOrders();}
function waOrd(id){const o=D.orders.find(x=>x.id===id);const msg=encodeURIComponent(`🎮 *ROCCO GAMING*\n¡Gracias ${o.client}! 🙌\n📦 ${o.products.join(',')}\n💵 $${o.total} · Bs. ${(o.total*o.tasa).toFixed(2)}\n💳 ${o.payment}`);window.open('https://wa.me/'+o.phone.replace(/\D/g,'')+'?text='+msg,'_blank');}

  <input oninput="fCRM(this.value)" placeholder="🔍 Buscar..." style="margin-bottom:14px"/>
  <div id="cl" style="display:flex;flex-direction:column;gap:9px">
  ${D.clients.map(c=>`<div class="panel" style="padding:16px"><div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:11px"><div style="width:40px;height:40px;border-radius:50%;background:#00e5ff11;display:flex;align-items:center;justify-content:center;font-weight:700;color:#00e5ff;border:1px solid #00e5ff22">${c.name.charAt(0)}</div><div><div style="font-weight:700;font-size:14px">${c.name}</div><div style="font-size:12px;color:#475569">${c.phone}</div></div></div><div style="text-align:right"><div style="font-size:18px;font-weight:700;color:#00e5ff">$${c.total}</div><div style="font-size:12px;color:#475569">${c.purchases} compra(s)</div></div></div><div style="display:flex;gap:8px;margin-top:10px"><a href="https://wa.me/${c.phone.replace(/\D/g,'')}" target="_blank" style="background:#25d36611;border:1px solid #25d36644;color:#25d366;padding:5px 12px;border-radius:7px;font-size:12px;text-decoration:none">💬 WhatsApp</a></div></div>`).join('')}
  </div>`;
}
function fCRM(q){const items=g('cl').querySelectorAll('.panel');D.clients.forEach((c,i)=>{items[i].style.display=(c.name.toLowerCase().includes(q.toLowerCase())||c.phone.includes(q))?'block':'none';});}

// FINANCIAL
function rFin(){
  const done=D.orders.filter(o=>o.status==='completado');
  const sales=done.reduce((s,o)=>s+o.total,0);
  const exps=D.expenses.reduce((s,e)=>s+e.amount,0);
  const profit=sales-exps; const mg=sales>0?((profit/sales)*100).toFixed(1):0;
  const cfg=D.cfg; const pmt=done.reduce((a,o)=>{a[o.payment]=(a[o.payment]||0)+o.total;return a},{});
  g('tab-f').innerHTML=`<div style="margin-bottom:22px"><h2 style="font-size:20px;background:linear-gradient(135deg,#00e5ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Finanzas</h2><p style="color:#475569;font-size:12px">Análisis económico</p></div>
  <div class="g4" style="margin-bottom:20px">${[{i:'📈',l:'Ingresos',v:'$'+sales.toFixed(2),c:'#22c55e'},{i:'📉',l:'Gastos',v:'$'+exps.toFixed(2),c:'#ef4444'},{i:'💰',l:'Ganancia',v:'$'+profit.toFixed(2),c:profit>=0?'#00e5ff':'#ef4444'},{i:'📊',l:'Margen',v:mg+'%',c:'#a855f7'}].map(c=>`<div class="sc" style="border:1px solid ${c.c}22;border-left:3px solid ${c.c}"><div style="font-size:20px">${c.i}</div><div style="font-size:18px;font-weight:700;color:${c.c};font-family:'Orbitron',sans-serif;margin-top:5px">${c.v}</div><div style="font-size:11px;color:#475569;margin-top:2px">${c.l}</div></div>`).join('')}</div>
  <div class="panel" style="padding:18px;margin-bottom:16px"><h3 style="font-size:13px;margin-bottom:12px;color:#f59e0b">💱 Multi-moneda</h3><div class="g3">${[['USD 💵','#00e5ff','$'+profit.toFixed(2)],[`Bs ×${cfg.tasaBCV}`,'#f59e0b','Bs.'+(profit*cfg.tasaBCV).toFixed(2)],[`CLP ×${cfg.tasaCLP}`,'#a855f7','$'+(profit*cfg.tasaCLP).toLocaleString()]].map(([l,c,v])=>`<div style="text-align:center;padding:14px;background:#060610;border-radius:9px"><div style="font-size:18px;font-weight:700;color:${c}">${v}</div><div style="font-size:10px;color:#475569;margin-top:3px">${l}</div></div>`).join('')}</div></div>
  <div class="panel" style="padding:18px"><h3 style="font-size:13px;margin-bottom:12px;color:#a855f7">Por Método de Pago</h3>${Object.entries(pmt).map(([m,t])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #0f0f25"><span style="font-size:13px">${m}</span><span style="color:#00e5ff;font-weight:700">$${t.toFixed(2)}</span></div>`).join('')}${!Object.keys(pmt).length?'<p style="color:#475569;font-size:12px">Sin ventas completadas aún</p>':''}</div>`;
}

// CALCULATORS
function rCalc(){
  const cfg=D.cfg;
  g('tab-k').innerHTML=`<div style="margin-bottom:22px"><h2 style="font-size:20px;background:linear-gradient(135deg,#00e5ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Calculadoras</h2><p style="color:#475569;font-size:12px">Herramientas rápidas</p></div>
  <div class="g2">
    <div class="panel" style="padding:22px;border:1px solid #00e5ff22"><h3 style="font-size:14px;margin-bottom:16px;color:#00e5ff">🧮 Precio con Margen</h3><label class="lbl">Costo (USD)</label><input id="cc" type="number" oninput="cMg()"/><div style="margin-top:14px"><label class="lbl" id="cmgl">Margen: 40%</label><input type="range" min="5" max="300" value="40" oninput="g('cmgl').textContent='Margen: '+this.value+'%';cMg()" id="cmgr" style="margin-top:8px;accent-color:#00e5ff;background:transparent;border:none;width:100%"/></div><div id="cmgres" style="display:none;margin-top:14px;background:#060610;border-radius:9px;padding:14px"></div></div>
    <div class="panel" style="padding:22px;border:1px solid #a855f722"><h3 style="font-size:14px;margin-bottom:16px;color:#a855f7">💱 Convertidor</h3><div style="display:flex;gap:10px;margin-bottom:12px"><div style="flex:1"><label class="lbl">Monto</label><input id="cca" type="number" oninput="cCv()"/></div><div style="flex:0 0 90px"><label class="lbl">Desde</label><select id="ccf" onchange="cCv()" style="margin-top:5px"><option value="USD">USD</option><option value="Bs">Bs</option><option value="CLP">CLP</option></select></div></div><div id="ccres"></div><div style="margin-top:10px;padding:9px;background:#060610;border-radius:8px;font-size:11px;color:#475569">BCV: Bs.${cfg.tasaBCV} · CLP: ${cfg.tasaCLP}</div></div>
    <div class="panel" style="padding:22px;border:1px solid #22c55e22"><h3 style="font-size:14px;margin-bottom:16px;color:#22c55e">🚚 Delivery</h3><label class="lbl">Zona</label><select id="czn" onchange="cDl()" style="margin-bottom:12px">${cfg.zones.map((z,i)=>`<option value="${i}">${z.name} · $${z.price}</option>`).join('')}</select><label class="lbl">Peso (kg)</label><input id="cwt" type="number" oninput="cDl()"/><div id="cdlres" style="margin-top:14px;background:#060610;border-radius:9px;padding:14px"><div style="display:flex;justify-content:space-between"><span style="font-weight:700">Total:</span><div style="text-align:right"><div style="color:#22c55e;font-weight:700;font-family:'Orbitron',sans-serif;font-size:17px" id="cdlt">$${cfg.zones[0]?.price||0}.00</div><div style="font-size:11px;color:#f59e0b" id="cdlb">Bs. ${((cfg.zones[0]?.price||0)*cfg.tasaBCV).toFixed(2)}</div></div></div></div></div>
    <div class="panel" style="padding:22px;border:1px solid #f59e0b22"><h3 style="font-size:14px;margin-bottom:16px;color:#f59e0b">🔒 Apartado</h3><label class="lbl">Precio (USD)</label><input id="cap" type="number" oninput="cAp()"/><div style="margin-top:14px"><label class="lbl" id="capl">Inicial: 50%</label><input type="range" min="10" max="90" step="10" value="50" oninput="g('capl').textContent='Inicial: '+this.value+'%';cAp()" id="capr" style="margin-top:8px;accent-color:#f59e0b;background:transparent;border:none;width:100%"/></div><div id="cares" style="display:none;margin-top:12px;background:#060610;border-radius:9px;padding:14px"></div></div>
  </div>`;
}
function cMg(){const c=parseFloat(g('cc').value)||0,mg=parseInt(g('cmgr').value)||40,cfg=D.cfg;if(!c){g('cmgres').style.display='none';return;}const s=(c*(1+mg/100)).toFixed(2);g('cmgres').style.display='block';g('cmgres').innerHTML=`<div style="font-size:26px;font-weight:700;color:#00e5ff;font-family:'Orbitron',sans-serif">$${s}</div><div style="font-size:12px;color:#f59e0b;margin-top:5px">Bs. ${(s*cfg.tasaBCV).toFixed(2)}</div><div style="border-top:1px solid #1e1e40;margin-top:8px;padding-top:8px;font-size:12px;color:#22c55e;font-weight:700">Ganancia: $${(s-c).toFixed(2)}</div>`;}
function cCv(){const a=parseFloat(g('cca').value)||0,f=g('ccf').value,cfg=D.cfg;if(!a){g('ccres').innerHTML='';return;}let r={};if(f==='USD')r={USD:a,Bs:(a*cfg.tasaBCV).toFixed(2),CLP:(a*cfg.tasaCLP).toLocaleString()};else if(f==='Bs')r={Bs:a,USD:(a/cfg.tasaBCV).toFixed(2),CLP:((a/cfg.tasaBCV)*cfg.tasaCLP).toLocaleString()};else r={CLP:a,USD:(a/cfg.tasaCLP).toFixed(2),Bs:((a/cfg.tasaCLP)*cfg.tasaBCV).toFixed(2)};g('ccres').innerHTML=`<div style="background:#060610;border-radius:9px;padding:14px">${Object.entries(r).map(([cur,val])=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #0f0f25"><span style="font-size:13px;color:#475569">${cur}</span><strong style="color:${cur==='USD'?'#00e5ff':cur==='Bs'?'#f59e0b':'#a855f7'};font-size:15px">${val}</strong></div>`).join('')}</div>`;}
function cDl(){const z=parseInt(g('czn').value)||0,w=parseFloat(g('cwt').value)||0,base=D.cfg.zones[z]?.price||0,t=base+(w*0.5),cfg=D.cfg;g('cdlt').textContent='$'+t.toFixed(2);g('cdlb').textContent='Bs. '+(t*cfg.tasaBCV).toFixed(2);}
function cAp(){const p=parseFloat(g('cap').value)||0,pct=parseInt(g('capr').value)||50,cfg=D.cfg;if(!p){g('cares').style.display='none';return;}const d=(p*pct/100).toFixed(2),b=(p-d).toFixed(2);g('cares').style.display='block';g('cares').innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:7px"><span style="font-size:12px;color:#475569">Inicial (${pct}%):</span><strong style="color:#22c55e">$${d}</strong></div><div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:#475569">Saldo:</span><strong style="color:#f59e0b">$${b}</strong></div><button onclick="waAp(${p},${d},${b})" style="width:100%;margin-top:10px;background:#f59e0b11;border:1px solid #f59e0b44;color:#f59e0b;padding:8px;border-radius:8px;cursor:pointer;font-size:13px">💬 Enviar por WA</button>`;}
function waAp(p,d,b){const msg=encodeURIComponent('🔒 *APARTADO - ROCCO GAMING*\nTotal: $'+p+'\nInicial: $'+d+' · Bs.'+(d*D.cfg.tasaBCV).toFixed(2)+'\nSaldo: $'+b);window.open('https://wa.me/'+WA+'?text='+msg,'_blank');}

// CONFIG
function rCfg(){
  const cfg=D.cfg;
  g('tab-s').innerHTML=`<div style="margin-bottom:22px"><h2 style="font-size:20px;background:linear-gradient(135deg,#00e5ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Ajustes</h2></div>
  <div class="g2">
    <div class="panel" style="padding:22px"><h3 style="font-size:14px;margin-bottom:14px;color:#f59e0b">💱 Tasas</h3><label class="lbl">BCV (Bs/$)</label><input id="sb" type="number" value="${cfg.tasaBCV}" style="margin-bottom:12px"/><label class="lbl">Paralelo</label><input id="sp" type="number" value="${cfg.tasaParalelo}" style="margin-bottom:12px"/><label class="lbl">CLP/USD</label><input id="sc" type="number" value="${cfg.tasaCLP}"/></div>
    <div class="panel" style="padding:22px"><h3 style="font-size:14px;margin-bottom:14px;color:#00e5ff">💳 Datos de Pago</h3><label class="lbl">Binance User</label><input id="sbi" value="${cfg.binanceUser}" style="margin-bottom:12px"/><label class="lbl">Pago Móvil</label><input id="spm" value="${cfg.pagoMovil}" style="margin-bottom:12px"/><label class="lbl">Banco</label><input id="sbk" value="${cfg.banco}" style="margin-bottom:12px"/><label class="lbl">Cédula</label><input id="scd" value="${cfg.cedula}"/></div>
    <div class="panel" style="padding:22px"><h3 style="font-size:14px;margin-bottom:14px;color:#22c55e">🚚 Zonas Delivery</h3><div id="szones">${cfg.zones.map((z,i)=>`<div style="display:flex;gap:10px;margin-bottom:10px"><input value="${z.name}" onchange="D.cfg.zones[${i}].name=this.value" style="flex:2"/><input type="number" value="${z.price}" onchange="D.cfg.zones[${i}].price=parseFloat(this.value)||0" style="width:60px"/><button onclick="D.cfg.zones.splice(${i},1);rCfg()" style="background:#ef444411;border:1px solid #ef444444;color:#ef4444;padding:4px 8px;border-radius:7px;font-size:12px">✕</button></div>`).join('')}</div><button onclick="D.cfg.zones.push({name:'Nueva Zona',price:5});rCfg()" style="background:#22c55e11;border:1px solid #22c55e44;color:#22c55e;padding:5px 14px;border-radius:7px;font-size:12px">+ Agregar</button></div>
    <div class="panel" style="padding:22px"><h3 style="font-size:14px;margin-bottom:14px;color:#a855f7">📱 QR Tienda</h3><div style="text-align:center"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://rocco-gaming.vercel.app&color=00e5ff&bgcolor=0d0d20" alt="QR" style="border-radius:10px;border:1px solid #1e1e40;width:150px"/><p style="font-size:11px;color:#475569;margin-top:10px">¡Ponelo en tu bio de Instagram! 🎯</p></div></div>
  </div>
  <div style="margin-top:20px"><button class="bp" onclick="sCfg()" style="padding:12px 32px;font-size:15px">💾 Guardar Todo</button></div>`;
}
function sCfg(){D.cfg.tasaBCV=parseFloat(g('sb').value)||38.5;D.cfg.tasaParalelo=parseFloat(g('sp').value)||40.2;D.cfg.tasaCLP=parseFloat(g('sc').value)||950;D.cfg.binanceUser=g('sbi').value;D.cfg.pagoMovil=g('spm').value;D.cfg.banco=g('sbk').value;D.cfg.cedula=g('scd').value;ntf('✅ Configuración guardada');}

// INIT
sv('l');
</script>
</body>
</html>
